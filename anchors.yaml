# photochron Anchors File — TEMPLATE (all entries commented out)
# ===========================================================================
# WARNING: This file is a *template*. Uncomment and edit the entries below to
# add your own anchors. Keep this file OUT of version control once it contains
# real birthdays. (Add `anchors.yaml` to your local clone's `.gitignore`.)
#
# photochron uses these entries to constrain its chronological sort:
#   - persons[].birthday   → priors for face-age signals
#   - events[].date        → hard/soft date constraints for named photos
#   - known_dates[]        → partially-known dates (month/year) per photo
#
# Default state: an empty anchors file loads as zero constraints, which is a
# valid configuration — photochron will rely on AI signals alone.
# ===========================================================================

# Persons section. Each entry needs:
#   id        — internal slug
#   name      — display name
#   birthday  — optional ISO date (YYYY-MM-DD)
# persons:
#   - id: person_a
#     name: "Person A"
#     birthday: "1980-01-15"
#
#   - id: person_b
#     name: "Person B"
#     birthday: "1985-07-22"

# Events section. `type: hard` constraints MUST be satisfied; `soft` ones guide
# ranking but can be violated.
# events:
#   - name: "Moved to new city"
#     date: "1991-08-01"
#     type: hard
#     photos_after:    # files whose timestamps must be AFTER this date
#       - "scan_0042.jpg"
#
#   - name: "Family vacation"
#     date: "2005-06-15"
#     type: soft
#     photos_before:   # files whose timestamps should be BEFORE this date
#       - "vacation_01.jpg"

# Known dates section. Use when you remember month/year of a photo but not the
# exact day.
# known_dates:
#   - file: "christmas_photo.jpg"
#     month: 12
#     year: 1998
#     type: soft
#
#   - file: "summer_beach.jpg"
#     month: 7
#     # year omitted — let the AI estimate it
#     type: soft

# Note: file names in photos_after, photos_before, and `file` fields are matched
# against the original file name (without path) during ingestion.
