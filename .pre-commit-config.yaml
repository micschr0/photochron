# Pre-commit hooks.
#
# Recommended setup:
#   uv sync --group dev
#   uv run pre-commit install
#
# Run on demand:
#   uv run pre-commit run --all-files
#
# Hook versions are bumped via `pre-commit autoupdate`. CI runs the same
# hooks via `.github/workflows/ci.yml` so contributors who forget to install
# pre-commit locally are still caught.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Note: the mypy hook is intentionally NOT enabled in pre-commit. It would
  # need the full dependency tree as `additional_dependencies` (typer, rich,
  # loguru, ollama, onnxruntime, …) to type-check the CLI surface, which
  # bloats every contributor's pre-commit env to ~200 MB and still drifts
  # from what the real install resolves. mypy runs in CI instead, against a
  # real venv that mirrors what users get with `uv sync`.

  # Push-time test gate: unit tests only. The full suite (integration) needs
  # Ollama + InsightFace running and is intentionally skipped here so `git
  # push` works on machines without the ML stack.
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit only)
        entry: uv run pytest tests/unit -x -q -m "not integration"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
