# PhotoChron Configuration
#
# IMPORTANT – MODEL LICENSES
# ---------------------------------------------------------------------------
# The AI model entries below are intentionally commented out. PhotoChron does
# NOT ship with a hardcoded default model. You must:
#   1. Verify the license of each model for your intended use (private family
#      archive, personal research, etc.). Licenses change; check the current
#      terms from the model's authors.
#   2. Uncomment exactly the lines you want to activate.
# If no model is configured, `photochron run` will refuse to start with a
# message that points back here.
#
# Reference links (verify before use):
#   - InsightFace buffalo_l:  https://github.com/deepinsight/insightface
#   - Ollama llava-next:7b:    https://ollama.com/library/llava
#   - Ollama moondream2:       https://ollama.com/library/moondream
# ---------------------------------------------------------------------------

version: "1.0"

paths:
  # Directory for cache and database
  cache_dir: ".photochron"
  # Directory for downsampled thumbnails
  thumbs_dir: ".photochron/thumbs"
  # Directory for output files
  output_dir: "photochron_output"

models:
  # Uncomment after license review. Empty string = not configured.
  # insightface_version: "buffalo_l"
  # ollama_model: "llava-next:7b"
  # fallback_model: "moondream2"
  max_image_size: 1024

ingestion:
  max_downsample_size: 1024
  supported_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".heic"
    - ".heif"
    - ".cr2"
    - ".nef"
    - ".arw"
    - ".dng"
  skip_duplicates: true
  # GPS extraction is opt-in. Family photos are private by default and GPS
  # can de-anonymize locations when reports or EXIF-enriched copies are shared.
  extract_gps: false
  fallback_timestamp: "file_mtime"

face:
  # Uncomment after license review.
  # model_name: "buffalo_l"
  detection_threshold: 0.5
  matching_threshold: 0.6
  age_confidence_scale: 0.1
  use_gpu: false
  batch_size: 1

context:
  ollama_host: "http://localhost:11434"
  ollama_timeout: 300  # 5 minutes for vision LLM inference
  max_retries: 3
  retry_delay: 2.0  # seconds
  # Uncomment after license review.
  # primary_model: "llava-next:7b"
  # fallback_model: "moondream2"
  batch_size: 1
  min_decade_confidence: 0.3
  min_season_confidence: 0.4
  use_fallback_on_failure: true
  store_minimal_on_complete_failure: true

  # Ollama runtime tuning (biggest single win for Apple-Silicon throughput).
  # keep_alive: how long Ollama keeps the model resident between calls. Setting
  # this high avoids the ~10–30s reload cost for every photo. "-1" = forever.
  keep_alive: "30m"
  # Context window. 2048 tokens is comfortably enough for our short prompts
  # and a bounded 500-token response; lower values save Metal memory on
  # machines with 8–16 GB unified memory.
  num_ctx: 2048
  # Number of GPU layers for Ollama. -1 = auto (all layers on Metal on Apple
  # Silicon). Set to 0 to force CPU.
  num_gpu: -1
  # Per-model override of any of the above. Keys are model names (as typed in
  # `ollama list`). Example: let the lighter moondream2 use a smaller ctx.
  # model_options:
  #   moondream2:
  #     num_ctx: 1024
  #   "llava-next:7b":
  #     keep_alive: "1h"

pipeline:
  face_age_weight: 0.45
  llm_decade_weight: 0.30
  photo_medium_weight: 0.10
  min_confidence_threshold: 0.5
  max_pairwise_comparisons: 500

# Environment variable overrides
# ---------------------------------------------------------------------------
# Any field above can be overridden via `PHOTOCHRON_<SECTION>_<KEY>`.
# Section names are case-insensitive; multi-word keys keep their underscores.
# Examples:
#   PHOTOCHRON_CONTEXT_OLLAMA_HOST=http://ollama:11434
#   PHOTOCHRON_FACE_USE_GPU=true
#   PHOTOCHRON_MODELS_MAX_IMAGE_SIZE=2048
# This makes it straightforward to run PhotoChron in a container where the
# Ollama service or cache paths differ from the host defaults.
